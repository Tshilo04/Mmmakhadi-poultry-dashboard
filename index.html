<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Poultry Dashboard</title>
</head>
<body>
    <header>
        <h1>Poultry Dashboard</h1>
    </header>
    <section class="kpi">
        <div class="kpi-card">Total Production: <span id="total-production"></span></div>
        <div class="kpi-card">Monthly Revenue: <span id="monthly-revenue"></span></div>
        <div class="kpi-card">Active Hens: <span id="active-hens"></span></div>
        <div class="kpi-card">Daily Egg Count: <span id="daily-egg-count"></span></div>
    </section>
    <section class="charts">
        <canvas id="chart1"></canvas>
        <canvas id="chart2"></canvas>
        <canvas id="chart3"></canvas>
        <canvas id="chart4"></canvas>
        <canvas id="chart5"></canvas>
        <canvas id="chart6"></canvas>
        <canvas id="chart7"></canvas>
        <canvas id="chart8"></canvas>
    </section>
    <section class="data-table">
        <h2>Monthly Data</h2>
        <table>
            <tr>
                <th>Month</th>
                <th>Production</th>
                <th>Revenue</th>
            </tr>
            <tbody id="data-rows"></tbody>
        </table>
    </section>
    <section class="filters">
        <label for="date-filter">Select Month:</label>
        <select id="date-filter"></select>
    </section>
    <section class="insights">
        <h2>Business Insights</h2>
        <p id="insights"></p>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
